version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: whoop-med-tracker-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: whoop
      POSTGRES_PASSWORD: whoop
      POSTGRES_DB: whoop_med_tracker
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
